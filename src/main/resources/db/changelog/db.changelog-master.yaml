databaseChangeLog:
  - changeSet:
      id: 001-create-calendars-table
      author: arthur-starovoyt
      changes:
        - createTable:
            tableName: calendars
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: color
                  type: varchar(20)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - createIndex:
            tableName: calendars
            indexName: idx_calendars_name
            columns:
              - column:
                  name: name
